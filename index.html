<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>H2Flow Wastewater Treatment Equipment Map</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="brand-wrap">
          <button class="brand-button" type="button" aria-label="H2Flow">
            <span class="brand-mark"
              ><img src="images/H2FlowLogo.png" alt="H2Flow logo"
            /></span>
          </button>
          <div class="header-copy">
            <h1>Wastewater Treatment Equipment Map</h1>
            <p>
              Tap any process area to explore representative equipment and
              videos.
            </p>
          </div>
        </div>
        <div class="header-tools">
          <button id="fullscreenButton" class="ghost-button" type="button">
            Fullscreen
          </button>
        </div>
      </header>
      <main class="app-main">
      
        <section id="statusCard" class="status-card">
          <p>Loading equipment map…</p>
        </section>
        <section
          id="tileGrid"
          class="tile-grid"
          hidden
          aria-label="Wastewater treatment process areas"
        ></section>
      </main>
      <footer class="app-footer">
        <p>© 2026 H2Flow</p>
      </footer>
    </div>
    <div id="overlay" class="overlay is-hidden" aria-hidden="true"></div>
    <section
      id="equipmentModal"
      class="modal equipment-modal is-hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="equipmentModalTitle"
    >
      <button
        id="equipmentCloseButton"
        class="close-button"
        type="button"
        aria-label="Close equipment list"
      >
        ×
      </button>
      <div class="modal-header-block">
        <h2 id="equipmentModalTitle">Equipment</h2>
        <p class="modal-subtitle">Sorted by vendor</p>
      </div>
      <div id="equipmentList" class="equipment-list"></div>
    </section>
    <section
      id="videoModal"
      class="modal video-modal is-hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="videoModalTitle"
    >
      <button
        id="videoCloseButton"
        class="close-button"
        type="button"
        aria-label="Close video"
      >
        ×
      </button>
      <h2 id="videoModalTitle">Video</h2>
      <div class="video-frame-wrap">
        <iframe
          id="videoFrame"
          title="Equipment video"
          src=""
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
          "
          allowfullscreen
          referrerpolicy="strict-origin-when-cross-origin"
          loading="lazy"
        ></iframe
        ><video
          id="html5Video"
          class="html5-video is-hidden"
          controls
          playsinline
          preload="metadata"
        ></video>
      </div>
    </section>
    <script src="app.js"></script>
  </body>
</html>
